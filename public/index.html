<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Jogos</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header class="header">
    <h1>Galeria de Jogos</h1>
    <nav class="menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Jogos</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <section class="banner">
        <h2>Bem-vindo ao mundo dos jogos</h2>
    </section>
    
    <section class="carousel">
        <script src="script.js"></script>

    <div class="carousel-container">

        <div class="slide active">
            <img src="https://picsum.photos/id/1015/1200/400">
            <h2>Jogo em destaque 1</h2>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1016/1200/400">
            <h2>Jogo em destaque 2</h2>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1018/1200/400">
            <h2>Jogo em destaque 3</h2>
        </div>

    </div>

    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>

    </section>

    

    <section class="jogos">

        <article class="card">
            <img src="https://picsum.photos/id/1/200/300">
            <h3>Jogo 1</h3>
            <p>Descrição do jogo.</p>
            <button>Ver mais</button>
        </article>

        <article class="card">
            <img src="https://picsum.photos/id/2/200/300">
            <h3>Jogo 2</h3>
            <p>Descrição do jogo.</p>
            <button>Ver mais</button>
        </article>

        <article class="card">
            <img src="https://picsum.photos/id/3/200/300">
            <h3>Jogo 3</h3>
            <p>Descrição do jogo.</p>
            <button>Ver mais</button>
        </article>

    </section>

    <section class="formulario">
        <h2>Inscreva-se</h2>
        <form>
            <input type="text" placeholder="Nome">
            <input type="email" placeholder="Email">
            <button type="submit">Enviar</button>
        </form>
    </section>

    <footer class="footer">
    <p>© 2026 - Rafael Vasconcellos Vaz de Mello </p>
</footer>


</body>
</html>
